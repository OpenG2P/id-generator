global:
  idGeneratorHostname: 'idgenerator.trial.openg2p.org'

  # Database
  postgresqlHost: commons-postgresql

  idGeneratorDB: '{{ printf "%s" .Release.Name | replace "-" "_" }}'
  idGeneratorDBPort: 5432
  idGeneratorDBUser: '{{ printf "%s_user" .Release.Name | replace "-" "_" }}'
  idGeneratorDBSecret: '{{ .Release.Name }}'
  idGeneratorDBUserPasswordKey: '{{ .Release.Name }}-db-user'

postgres-init:
  enabled: true
  postgresql:
    host: '{{ .Values.global.postgresqlHost }}'
    port: 5432
    existingSecret: commons-postgresql
    existingSecretPostgresPasswordKey: postgres-password
  databases:
    - name: '{{ tpl .Values.global.idGeneratorDB $ }}'
      user: '{{ tpl .Values.global.idGeneratorDBUser $ }}'
      secret: '{{ tpl .Values.global.idGeneratorDBSecret $ }}'
      secretUserPasswordKey: '{{ tpl .Values.global.idGeneratorDBUserPasswordKey $ }}'

idGenerator:
  enabled: true
  nameOverride: id-generator
  hostname: '{{ tpl .Values.global.idGeneratorHostname $ }}'

  replicaCount: 1
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 80
  updateStrategy:
    type: RollingUpdate
  serviceAccount:
    create: false
    name: ""
  image:
    repository: openg2p/openg2p-id-generator
    tag: "1.0"
    pullPolicy: Always
  podSecurityContext:
    enabled: false
    fsGroup: 1000
  containerSecurityContext:
    enabled: false
    runAsUser: 1000
    runAsNonRoot: true

  # -- Resource requests and limits for the container.
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi

  service:
    type: ClusterIP
    port: 80
    externalTrafficPolicy: Cluster

  istio:
    enabled: true
    virtualservice:
      enabled: true
      host: '{{ tpl .Values.idGenerator.hostname $ }}'
      gateway: "internal"
      destination: ""
      destinationPort: '{{ .Values.idGenerator.service.port }}'
      prefix: /v1/idgenerator/
      rewriteUri: ""
    gateway:
      enabled: false
      host: '{{ tpl .Values.idGenerator.hostname $ }}'
      ingressController:
        istio: ingressgateway
      httpTlsRedirect: false
      httpEnabled: true
      httpsEnabled: false
      tls:
        mode: SIMPLE
        credentialName: ""

  # ---------------------------------------------------------------------------
  # Application configuration — ID types, filter rules, pool settings
  # This is rendered as a ConfigMap and mounted into the container.
  # ---------------------------------------------------------------------------
  appConfig:
    # -- ID types for ID generation. Each ID type gets its own DB table.
    # -- Add or remove ID types here; restart pods to apply.
    idTypes:
      farmer:
        idLength: 12
      household:
        idLength: 10
      # social_id:
      #   idLength: 10

    # -- Filter rules. Adjust only if you understand the impact on ID space.
    sequenceLimit: 3
    repeatingLimit: 2
    repeatingBlockLimit: 2
    conjugativeEvenDigitsLimit: 3
    digitsGroupLimit: 5
    reverseDigitsGroupLimit: 5
    notStartWith: ["0", "1"]
    restrictedNumbers: []

    # -- Pool management
    poolMinThreshold: 1000
    poolGenerationBatchSize: 5000
    poolCheckIntervalSeconds: 30
    exhaustionMaxAttempts: 1000
    subBatchSize: 10000

  # ---------------------------------------------------------------------------
  # Environment variables
  # ---------------------------------------------------------------------------
  envVars:
    # -- Database connection (derived from global values)
    DB_HOST: '{{ .Values.global.postgresqlHost }}'
    DB_PORT: '{{ .Values.global.idGeneratorDBPort }}'
    DB_NAME: '{{ tpl .Values.global.idGeneratorDB $ }}'
    DB_USER: '{{ tpl .Values.global.idGeneratorDBUser $ }}'
    # -- Path to config file inside the container (mounted from ConfigMap)
    CONFIG_PATH: /app/config/config.yaml
    # -- Uvicorn workers per pod. Increase for higher throughput on multi-core nodes.
    # UVICORN_WORKERS: "1"
    # -- Log level: debug, info, warning, error, critical
    # UVICORN_LOG_LEVEL: "info"

  envVarsFrom:
    DB_PASSWORD:
      secretKeyRef:
        name: '{{ tpl .Values.global.idGeneratorDBSecret $ }}'
        key: '{{ tpl .Values.global.idGeneratorDBUserPasswordKey $ }}'

  startupProbe:
    enabled: true
    httpGet:
      path: /v1/idgenerator/health
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
    successThreshold: 1
  livenessProbe:
    enabled: true
    httpGet:
      path: /v1/idgenerator/health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1
  readinessProbe:
    enabled: true
    httpGet:
      path: /v1/idgenerator/health
      port: http
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6
    successThreshold: 1

  postgresCheckerInit:
    enabled: true
    image:
      repository: jbergknoff/postgresql-client
      tag: latest
      pullPolicy: IfNotPresent
    command:
    - 'sh'
    args:
    - '-c'
    - 'until psql "postgresql://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}" -c "SELECT 1" > /dev/null 2>&1; do echo "Waiting for database ${DB_NAME} to be ready..."; sleep 3; done'
    containerSecurityContext:
      enabled: false

  containerPort: 8000
