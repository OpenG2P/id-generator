apiVersion: v2
name: openg2p-id-generator
description: A Helm chart for OpenG2P ID Generator Service
type: application
version: 1.0.0-develop
dependencies:
- name: common
  repository: https://openg2p.github.io/openg2p-helm
  version: 2.30.0
- name: postgres-init
  version: 0.0.0-develop
  repository: https://openg2p.github.io/openg2p-helm
  condition: postgres-init.enabled
icon: https://openg2p.github.io/openg2p-helm/openg2p-logo.png
keywords:
  - openg2p
  - id-generator
maintainers:
  - email: info@openg2p.org
    name: OpenG2P
annotations:
  catalog.cattle.io/display-name: "OpenG2P ID Generator"
  openg2p.org/add-to-rancher: ""
