questions:

# General
- variable: global.idGeneratorHostname
  description: Hostname under which the ID Generator service will be accessed
  type: string
  label: ID Generator Hostname
  group: General

- variable: global.postgresqlHost
  description: PostgreSQL server host
  type: string
  label: PostgreSQL Server Host
  group: General

- variable: postgres-init.enabled
  description: Run Postgres init job to create database and user
  type: boolean
  label: Postgres Init
  group: General

- variable: idGenerator.enabled
  description: Install ID Generator service
  type: boolean
  label: ID Generator
  group: General

# Database
- variable: global.idGeneratorDB
  description: Name of the ID Generator database
  type: string
  label: Database Name
  group: Database

- variable: global.idGeneratorDBUser
  description: Database user name for the ID Generator
  type: string
  label: Database User
  group: Database

- variable: global.idGeneratorDBSecret
  description: Kubernetes secret that holds the database user password
  type: string
  label: Database Secret Name
  group: Database

- variable: global.idGeneratorDBUserPasswordKey
  description: Key in the above secret containing the database user password
  type: string
  label: Database Secret Password Key
  group: Database

# ID Types
- variable: idGenerator.appConfig.idTypes
  description: "ID generation types and their configuration. Each ID type gets its own DB table. Example: farmer_id with idLength 6."
  type: map
  label: ID Types
  group: ID Types

# Pool Management
- variable: idGenerator.appConfig.poolMinThreshold
  description: Minimum number of available IDs in the pool before background replenishment triggers
  type: int
  label: Pool Minimum Threshold
  group: Pool Management

- variable: idGenerator.appConfig.poolGenerationBatchSize
  description: Number of IDs to generate per replenishment cycle
  type: int
  label: Pool Generation Batch Size
  group: Pool Management

- variable: idGenerator.appConfig.poolCheckIntervalSeconds
  description: Interval in seconds between pool level checks
  type: int
  label: Pool Check Interval (seconds)
  group: Pool Management

# Image
- variable: idGenerator.image.repository
  description: Docker image repository for the ID Generator
  type: string
  label: Image Repository
  group: Image

- variable: idGenerator.image.tag
  description: Docker image tag
  type: string
  label: Image Tag
  group: Image

# Scaling
- variable: idGenerator.replicaCount
  description: Number of replicas
  type: int
  label: Replica Count
  group: Scaling

- variable: idGenerator.autoscaling.enabled
  description: Enable Horizontal Pod Autoscaler
  type: boolean
  label: Enable HPA
  group: Scaling
