  markers: [performance]
  file: test_performance.py
  description: >
    Issue 100 IDs sequentially. Assert p50<100ms, p95<500ms, p99<1000ms.

- id: PRF-002
  name: test_issue_id_concurrent_response_time
  category: performance
  markers: [performance]
  file: test_performance.py
  description: >
    Issue 50 IDs concurrently (asyncio.gather). Assert total time < 5s.

- id: PRF-003
  name: test_validate_id_response_time
  category: performance
  markers: [performance]
  file: test_performance.py
  description: >
    Validate one ID 100 times. Assert p50<50ms, p95<200ms.

- id: PRF-004
  name: test_health_endpoint_response_time
  category: performance
  markers: [performance]
  file: test_performance.py
  description: >
    Call health endpoint 50 times. Assert p95<200ms.

